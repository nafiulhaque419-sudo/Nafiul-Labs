<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <link rel="stylesheet" href="suvatStyle.css">
</head>
<body>
  <div id="SUVAT">
    <div id="display">0</div>
    <button id="AC">AC</button>
    <button id="calculate">Calculate</button>
    
    <input type="number" step="any" id="u" placeholder="Initial velocity (u) (m/s):">
  
    <input type="number" step="any" id="v" placeholder="Final velocity (v) (m/s):">
  
    <input type="number" step="any" id="a" placeholder="Accerleration (a) (m/s²):">
  
    <input type="number" step="any" id="t" placeholder="Time (t) (s):">
  
    <input type="number" step="any" id="s" placeholder="Displacement (s) (m):">
  </div>
  <script src="suvatLogic.js"></script>
</body>
</html>
